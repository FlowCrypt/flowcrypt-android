bind-interfaces
listen-address=127.0.0.1
port=53

# Do not read /etc/resolv.conf to avoid recursive localhost DNS loops.
no-resolv

# Upstream DNS for public domains.
server=8.8.8.8
server=1.1.1.1

# Local test domains.
address=/test/127.0.0.1
address=/localhost/127.0.0.1

log-queries
log-facility=-
